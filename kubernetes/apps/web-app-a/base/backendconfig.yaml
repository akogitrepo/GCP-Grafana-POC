apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: web-app-a-backendconfig
  namespace: web-app-a
spec:
  timeoutSec: 30
  connectionDraining:
    drainingTimeoutSec: 60
  healthCheck:
    type: HTTP
    requestPath: /healthz
    port: 8080
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 3
  logging:
    enable: true
    sampleRate: 1.0
  securityPolicy:
    name: edge-waf       # Cloud Armor policy created by Terraform
  iap:
    enabled: false
