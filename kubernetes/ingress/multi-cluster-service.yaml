# MultiClusterService — exposes the namespaced Service to the fleet so it can
# be targeted by MultiClusterIngress.
# Apply to the config-cluster only.
apiVersion: networking.gke.io/v1
kind: MultiClusterService
metadata:
  name: web-app-a
  namespace: web-app-a
spec:
  template:
    spec:
      selector:
        app: web-app-a
      ports:
        - name: http
          protocol: TCP
          port: 80
          targetPort: 8080
---
apiVersion: networking.gke.io/v1
kind: MultiClusterService
metadata:
  name: web-app-b
  namespace: web-app-b
spec:
  template:
    spec:
      selector:
        app: web-app-b
      ports:
        - name: http
          protocol: TCP
          port: 80
          targetPort: 8080
