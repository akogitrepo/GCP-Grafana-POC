name: terraform
on:
  pull_request:
    paths: ["terraform/**"]
  push:
    branches: [main]
    paths: ["terraform/**"]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_TF_PLAN_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Init
        working-directory: terraform/envs/${{ matrix.env }}
        run: terraform init -input=false

      - name: Validate
        working-directory: terraform/envs/${{ matrix.env }}
        run: terraform validate

      - name: Plan
        working-directory: terraform/envs/${{ matrix.env }}
        run: terraform plan -input=false -no-color | tee plan.txt

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = "### terraform plan — ${{ matrix.env }}\n\n```\n" +
              fs.readFileSync("terraform/envs/${{ matrix.env }}/plan.txt", "utf8").slice(0, 60000) +
              "\n```";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
