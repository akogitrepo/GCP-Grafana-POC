################################################################################
# deploy-prod.yml
# Triggered on push to `main` (merged PRs only — protect `main` with branch
# protection rules to enforce PR-before-merge). Also supports manual dispatch
# for hotfix deploys.
#
# Deployment strategy:
#   1. Build & scan images (Trivy hard-fail on CRITICAL/HIGH)
#   2. Require manual approval via GitHub Environment: production
#   3. Deploy to primary cluster — smoke-test before continuing
#   4. Deploy to secondary cluster — final rollout verification
#
# Required GitHub Actions Variables (Settings → Variables, Environment: production):
#   GCP_PROJECT_ID       – GCP project for prod
#   WIF_PROVIDER         – Workload Identity pool provider resource name
#   WIF_DEPLOYER_SA      – cicd-deployer service-account email
#   GKE_PRIMARY_REGION   – e.g. us-central1
#   GKE_SECONDARY_REGION – e.g. us-east1
#   GKE_PRIMARY_NAME     – e.g. gke-primary
#   GKE_SECONDARY_NAME   – e.g. gke-secondary
#
# Set up the `production` GitHub Environment with required reviewers and a
# 5-minute wait timer before proceeding to deployment.
################################################################################

name: deploy-prod

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "kubernetes/apps/**"
      - ".github/workflows/deploy-prod.yml"
  workflow_dispatch:
    inputs:
      app:
        description: "Specific app to deploy (leave blank for all)"
        required: false
        type: choice
        options: ["", web-app-a, web-app-b]
      reason:
        description: "Reason for manual deployment (required for audit trail)"
        required: true

env:
  REGISTRY: us-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/platform-images
  ENV_NAME: prod

permissions:
  contents: write   # write needed to commit image-tag updates back to repo
  id-token: write   # required for Workload Identity Federation

jobs:
  # ─── 1. Run unit tests ──────────────────────────────────────────────────────
  test:
    name: test / ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true   # fail fast in prod — don't proceed with broken tests
      matrix:
        app: [web-app-a, web-app-b]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package.json

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: Run tests
        working-directory: apps/${{ matrix.app }}
        run: npm test

  # ─── 2. Build, scan (hard fail), and push images ───────────────────────────
  build-push:
    name: build & push / ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: true
      matrix:
        app: [web-app-a, web-app-b]
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker → Artifact Registry
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Set image tags
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ matrix.app }}
          echo "tag_sha=${IMAGE}:${{ github.sha }}"    >> "$GITHUB_ENV"
          echo "tag_prod=${IMAGE}:prod-latest"         >> "$GITHUB_ENV"
          echo "tag_ver=${IMAGE}:$(date +%Y%m%d)-${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Build image
        working-directory: apps/${{ matrix.app }}
        run: |
          docker build \
            --label "git.sha=${{ github.sha }}" \
            --label "git.branch=main" \
            --label "environment=prod" \
            --label "build.number=${{ github.run_number }}" \
            -t "${{ env.tag_sha }}" \
            -t "${{ env.tag_prod }}" \
            -t "${{ env.tag_ver }}" \
            .

      - name: Trivy vulnerability scan (hard fail)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.tag_sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"    # block the pipeline on any CRITICAL or HIGH CVE
          format: table
          ignore-unfixed: true

      - name: Push all image tags
        run: |
          docker push "${{ env.tag_sha }}"
          docker push "${{ env.tag_prod }}"
          docker push "${{ env.tag_ver }}"

      - name: Commit image tag update to repo
        run: |
          git config user.name  "Abhay"
          git config user.email "abojha@teksystems.com"

          # Record the deployed image SHA in the kustomization
          sed -i "s|newTag:.*|newTag: ${{ github.sha }}|g" \
            kubernetes/apps/${{ matrix.app }}/overlays/primary/kustomization.yaml \
            kubernetes/apps/${{ matrix.app }}/overlays/secondary/kustomization.yaml \
            2>/dev/null || true

          git diff --quiet || git commit -am \
            "Checked in By Abhay and updated the work flow

            app: ${{ matrix.app }}
            image: ${{ env.tag_sha }}
            workflow: ${{ github.workflow }} #${{ github.run_number }}
            environment: prod"

          git push origin main || true  # non-blocking if nothing changed

  # ─── 3. Gate: manual approval before any prod cluster is touched ────────────
  #   Configure the `production` Environment in GitHub Settings with:
  #     - Required reviewers (e.g. SRE lead, release manager)
  #     - 5-minute wait timer
  #     - Branch restriction: main only
  approval-gate:
    name: approval gate
    runs-on: ubuntu-latest
    needs: build-push
    environment: production   # <-- this triggers the approval prompt
    steps:
      - name: Log approval
        run: |
          echo "Deployment approved by: ${{ github.actor }}"
          echo "SHA: ${{ github.sha }}"
          echo "Run: ${{ github.run_id }}"
          echo "Reason: ${{ github.event.inputs.reason || 'push to main' }}"

  # ─── 4. Deploy to primary cluster ──────────────────────────────────────────
  deploy-prod-primary:
    name: deploy-prod / primary / ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: approval-gate
    environment: production
    strategy:
      fail-fast: true
      matrix:
        app: [web-app-a, web-app-b]
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Deploy → primary cluster (us-central1)
        run: |
          gcloud container clusters get-credentials \
            ${{ vars.GKE_PRIMARY_NAME }} \
            --region ${{ vars.GKE_PRIMARY_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }}

          kubectl kustomize kubernetes/apps/${{ matrix.app }}/overlays/primary \
            | sed "s|:v1.0.0|:${{ github.sha }}|g" \
            | kubectl apply -f -

      - name: Wait for primary rollout
        run: |
          gcloud container clusters get-credentials \
            ${{ vars.GKE_PRIMARY_NAME }} \
            --region ${{ vars.GKE_PRIMARY_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }}

          kubectl -n ${{ matrix.app }} rollout status \
            deployment/${{ matrix.app }} --timeout=5m

      - name: Smoke test — primary
        run: |
          # Replace with your Global Load Balancer VIP or internal service URL
          kubectl -n ${{ matrix.app }} port-forward \
            svc/${{ matrix.app }} 8080:80 &
          sleep 5
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health)
            [ "$STATUS" = "200" ] && break
            echo "Attempt $i: HTTP $STATUS — retrying in 5s"
            sleep 5
          done
          [ "$STATUS" = "200" ] || (echo "Smoke test failed!" && exit 1)
          kill %1 || true

  # ─── 5. Deploy to secondary cluster (only after primary is healthy) ─────────
  deploy-prod-secondary:
    name: deploy-prod / secondary / ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: deploy-prod-primary
    environment: production
    strategy:
      fail-fast: true
      matrix:
        app: [web-app-a, web-app-b]
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Deploy → secondary cluster (us-east1)
        run: |
          gcloud container clusters get-credentials \
            ${{ vars.GKE_SECONDARY_NAME }} \
            --region ${{ vars.GKE_SECONDARY_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }}

          kubectl kustomize kubernetes/apps/${{ matrix.app }}/overlays/secondary \
            | sed "s|:v1.0.0|:${{ github.sha }}|g" \
            | kubectl apply -f -

      - name: Wait for secondary rollout
        run: |
          gcloud container clusters get-credentials \
            ${{ vars.GKE_SECONDARY_NAME }} \
            --region ${{ vars.GKE_SECONDARY_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }}

          kubectl -n ${{ matrix.app }} rollout status \
            deployment/${{ matrix.app }} --timeout=5m

  # ─── 6. Final verification across both clusters ─────────────────────────────
  verify-rollout:
    name: verify rollout
    runs-on: ubuntu-latest
    needs: deploy-prod-secondary
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Verify all deployments are running correct image
        run: |
          for APP in web-app-a web-app-b; do
            for CLUSTER_ARGS in \
              "${{ vars.GKE_PRIMARY_NAME }} --region ${{ vars.GKE_PRIMARY_REGION }}" \
              "${{ vars.GKE_SECONDARY_NAME }} --region ${{ vars.GKE_SECONDARY_REGION }}"; do
              gcloud container clusters get-credentials $CLUSTER_ARGS \
                --project ${{ vars.GCP_PROJECT_ID }}
              IMAGE=$(kubectl -n $APP get deployment/$APP \
                -o jsonpath='{.spec.template.spec.containers[0].image}')
              echo "$CLUSTER_ARGS | $APP image: $IMAGE"
              echo "$IMAGE" | grep -q "${{ github.sha }}" \
                || (echo "Image SHA mismatch for $APP!" && exit 1)
            done
          done

  # ─── 7. Rollback helper (manual trigger only) ───────────────────────────────
  rollback:
    name: rollback (manual only)
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'workflow_dispatch'
    needs: [deploy-prod-primary, deploy-prod-secondary]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Rollback all deployments
        run: |
          for APP in web-app-a web-app-b; do
            for CLUSTER_ARGS in \
              "${{ vars.GKE_PRIMARY_NAME }} --region ${{ vars.GKE_PRIMARY_REGION }}" \
              "${{ vars.GKE_SECONDARY_NAME }} --region ${{ vars.GKE_SECONDARY_REGION }}"; do
              gcloud container clusters get-credentials $CLUSTER_ARGS \
                --project ${{ vars.GCP_PROJECT_ID }}
              kubectl -n $APP rollout undo deployment/$APP
              kubectl -n $APP rollout status deployment/$APP --timeout=5m
            done
          done

  # ─── 8. Summary notification ────────────────────────────────────────────────
  notify:
    name: notify
    runs-on: ubuntu-latest
    needs: [verify-rollout]
    if: always()
    steps:
      - name: Post deployment status
        run: |
          STATUS="${{ needs.verify-rollout.result }}"
          echo "Prod deployment result: $STATUS"
          echo "Commit: ${{ github.sha }}"
          echo "Run: ${{ github.run_id }}"
          echo "Deployed by: ${{ github.actor }}"
          # Extend here with Slack/PagerDuty/Teams webhook if needed
