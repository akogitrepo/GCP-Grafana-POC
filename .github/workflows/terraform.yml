################################################################################
# terraform.yml
# Unified Terraform workflow for dev and prod environments.
#
# Triggers:
#   PR targeting develop   → plan for dev
#   PR targeting main      → plan for prod
#   Push to develop        → plan + auto-apply dev
#   Push to main           → plan + apply prod (requires `production` env approval)
#   workflow_dispatch      → manual plan or apply for either env
#
# Required GitHub Actions Variables (per environment):
#   GCP_PROJECT_ID  – GCP project ID
#   WIF_PROVIDER    – Workload Identity pool provider resource name
#   WIF_TF_PLAN_SA  – Service account for plan (read-only)
#   WIF_TF_APPLY_SA – Service account for apply (write access)
#
# Secrets:
#   TF_BACKEND_BUCKET – GCS bucket name for Terraform state
################################################################################

name: terraform

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [develop, main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, prod]
      action:
        description: "Terraform action"
        required: true
        type: choice
        options: [plan, apply]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  # ─── 1. Determine which environments are in scope ───────────────────────────
  setup:
    name: setup
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.envs.outputs.list }}
      do_apply: ${{ steps.envs.outputs.do_apply }}
    steps:
      - name: Resolve target environments and apply flag
        id: envs
        run: |
          EVENT="${{ github.event_name }}"
          BASE="${{ github.base_ref }}"     # set on pull_request
          REF="${{ github.ref_name }}"      # set on push / dispatch

          if [ "$EVENT" = "workflow_dispatch" ]; then
            ENVS='["${{ github.event.inputs.environment }}"]'
            DO_APPLY="${{ github.event.inputs.action == 'apply' && 'true' || 'false' }}"
          elif [ "$EVENT" = "pull_request" ]; then
            # PR → plan only, for the target branch's env
            [ "$BASE" = "main" ]    && ENVS='["prod"]' || ENVS='["dev"]'
            DO_APPLY="false"
          elif [ "$REF" = "main" ]; then
            ENVS='["prod"]'
            DO_APPLY="true"
          elif [ "$REF" = "develop" ]; then
            ENVS='["dev"]'
            DO_APPLY="true"
          else
            ENVS='["dev"]'
            DO_APPLY="false"
          fi

          echo "list=$ENVS"     >> "$GITHUB_OUTPUT"
          echo "do_apply=$DO_APPLY" >> "$GITHUB_OUTPUT"

  # ─── 2. Terraform plan ──────────────────────────────────────────────────────
  plan:
    name: plan / ${{ matrix.env }}
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(needs.setup.outputs.envs) }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP — plan SA
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_TF_PLAN_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        working-directory: terraform/envs/${{ matrix.env }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: terraform/envs/${{ matrix.env }}
        run: terraform validate

      - name: Terraform Format check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform Plan
        id: plan
        working-directory: terraform/envs/${{ matrix.env }}
        run: terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan.txt
        continue-on-error: false

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.env }}-${{ github.sha }}
          path: terraform/envs/${{ matrix.env }}/tfplan
          retention-days: 3

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('terraform/envs/${{ matrix.env }}/plan.txt', 'utf8');
            const truncated = raw.length > 60000 ? raw.slice(0, 60000) + '\n... (truncated)' : raw;
            const marker = '<!-- tf-plan-${{ matrix.env }} -->';

            // Update existing comment if present, else create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            const body = `${marker}\n### Terraform Plan — \`${{ matrix.env }}\`\n\n<details><summary>Show plan</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n</details>`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ─── 3a. Apply dev (auto — no approval required) ───────────────────────────
  apply-dev:
    name: apply / dev
    runs-on: ubuntu-latest
    needs: plan
    if: |
      needs.setup.outputs.do_apply == 'true' &&
      contains(fromJson(needs.setup.outputs.envs), 'dev')
    environment: development
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP — apply SA
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_TF_APPLY_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev-${{ github.sha }}
          path: terraform/envs/dev/

      - name: Terraform Init
        working-directory: terraform/envs/dev
        run: terraform init -input=false

      - name: Terraform Apply (dev)
        working-directory: terraform/envs/dev
        run: terraform apply -input=false -auto-approve tfplan

  # ─── 3b. Apply prod (requires `production` Environment approval) ────────────
  apply-prod:
    name: apply / prod
    runs-on: ubuntu-latest
    needs: [setup, plan]
    if: |
      needs.setup.outputs.do_apply == 'true' &&
      contains(fromJson(needs.setup.outputs.envs), 'prod')
    environment: production   # <-- triggers the approval gate
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP — apply SA
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_TF_APPLY_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod-${{ github.sha }}
          path: terraform/envs/prod/

      - name: Terraform Init
        working-directory: terraform/envs/prod
        run: terraform init -input=false

      - name: Terraform Apply (prod)
        working-directory: terraform/envs/prod
        run: terraform apply -input=false -auto-approve tfplan

      - name: Post apply summary
        if: always()
        run: |
          echo "Terraform apply (prod) result: ${{ job.status }}"
          echo "SHA: ${{ github.sha }}"
          echo "Applied by: ${{ github.actor }}"

